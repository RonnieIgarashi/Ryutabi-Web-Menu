<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竜の旅路亭 - Dragon's Journey Tavern</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Almendra+SC&family=IM+Fell+English:ital@0;1&family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main>
        <div class="main-top">
            <div class="logo-wrap">
                <img class="site-logo" src="images/店舗ロゴ_竜の旅路亭_v3_2.png" alt="竜の旅路亭">
            </div>
            <a href="https://ronnie-igarashi.com/profile" class="blog-link" target="_blank" rel="noopener">&#x1F4DC; Ronnie's Blog</a>
        </div>

        <section id="current-menu">
            <div class="section-banner">
                <h2>今回のお料理</h2>
                <p class="section-sub">Current Menu</p>
                <p class="event-label" id="event-label"></p>
            </div>
            <div class="current-grid" id="current-grid"></div>
        </section>

        <div class="section-rule">
            <span class="section-rule-inner">&#x2736;&ensp;&#x2736;&ensp;&#x2736;</span>
        </div>

        <section id="drinks-menu">
            <div class="section-banner">
                <h2>ドリンク</h2>
                <p class="section-sub">Drinks</p>
            </div>
            <div class="drinks-grid" id="drinks-grid"></div>
        </section>

        <div class="section-rule">
            <span class="section-rule-inner">&#x2736;&ensp;&#x2736;&ensp;&#x2736;</span>
        </div>

        <section id="archive">
            <div class="section-banner">
                <h2>過去のお料理</h2>
                <p class="section-sub">The Grand Compendium</p>
            </div>
            <div class="archive-grid" id="archive-grid"></div>
        </section>
    </main>

    <footer>
        <p class="footer-text">竜の旅路亭 at ichie (浅草橋Little Japan)</p>
        <p class="footer-sub">A wanderer's table, a mage's kitchen.</p>
    </footer>

    <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-name">
        <div class="modal-overlay" id="modal-overlay"></div>
        <button class="modal-nav modal-nav-prev" id="modal-prev" aria-label="前の料理"></button>
        <div class="modal-panel">
            <button class="modal-close" id="modal-close" aria-label="閉じる">&#x2715;</button>
            <img class="modal-image" id="modal-image" src="" alt="">
            <div class="modal-info">
                <div class="modal-category-badge" id="modal-category-badge"></div>
                <h3 class="modal-name" id="modal-name"></h3>
                <p class="modal-name-sub" id="modal-name-sub"></p>
                <p class="modal-description" id="modal-description"></p>
                <div class="modal-ingredients" id="modal-ingredients"></div>
                <p class="modal-event" id="modal-event"></p>
            </div>
        </div>
        <button class="modal-nav modal-nav-next" id="modal-next" aria-label="次の料理"></button>
    </div>

    <script src="app.js"></script>
</body>
</html>
